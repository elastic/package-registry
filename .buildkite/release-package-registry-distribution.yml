# yaml-language-server: $schema=https://raw.githubusercontent.com/buildkite/pipeline-schema/main/schema.json

env:
  NOTIFY_TO: "ecosystem-team@elastic.co"

steps:
  - label: ":thought_balloon: Pipeline contract"
    if: "build.source == 'ui' || build.env('BUILDKITE_TRIGGERED_FROM_BUILD_PIPELINE_SLUG') == 'fleet-server'"
    command: |
      buildkite-agent annotate --style "info" --context "release-contract" <<'MD'
      ### Release package-registry distribution

      This pipeline only runs for:

      - `build.source == 'ui'` (uses the input step to collect `DOCKER_TAG`).
      - Builds triggered from the `fleet-server` pipeline (must set `DOCKER_TAG` via `buildkite-agent meta-data set DOCKER_TAG <version>` before triggering).

      Expected `DOCKER_TAG` format: `major.minor.patch(-prerelease)?` (e.g. `1.2.3` or `1.2.3-alpha`).
      MD

  - input: ":truffleruby: Input version for docker tag"
    key: input
    if: "build.source == 'ui'"
    fields:
      - text: "The docker tag to be published (format: major.minor.patch(-prerelease)?)."
        hint: "e.g. 0.0.1"
        key: "DOCKER_TAG"
        required: true

  - label: ":hammer: Validate docker tag"
    if: "build.source == 'ui' || build.env('BUILDKITE_TRIGGERED_FROM_BUILD_PIPELINE_SLUG') == 'fleet-server'"
    key: validate
    command:
      - ".buildkite/scripts/validate-tag.sh"
    depends_on:
      - step: "input"
        allow_failure: false
    allow_dependency_failure: true

  - label: ":hammer: Release registry distribution {{matrix.tag_name}}"
    key: release-distribution
    if: "build.source == 'ui' || build.env('BUILDKITE_TRIGGERED_FROM_BUILD_PIPELINE_SLUG') == 'fleet-server'"
    matrix:
      setup:
        tag_name:
          - "lite"
          - "production"
    env:
      TAG_NAME: "{{matrix.tag_name}}"
      DOCKER_IMAGE: "docker.elastic.co/package-registry/distribution"
      DRY_RUN: false
    command:
      - ".buildkite/scripts/publish-distribution.sh"
    agents:
      provider: "gcp"
    depends_on:
      - step: "validate"
        allow_failure: false
    concurrency: 1
    concurrency_group: "package-registry/distribution-release"
    concurrency_method: "ordered"
    retry:
      automatic:
        - exit_status: -1
          limit: 2
        - exit_status: 143
          limit: 2
        - exit_status: 255
          limit: 2
    plugins:
      - elastic/vault-docker-login#v0.6.0:
          secret_path: 'kv/ci-shared/platform-ingest/elastic_docker_registry'

  - label: ":docker: Copy release images to Docker Hub"
    key: copy-release-images-to-dockerhub
    if: "build.source == 'ui' || build.env('BUILDKITE_TRIGGERED_FROM_BUILD_PIPELINE_SLUG') == 'fleet-server'"
    command: |
        set -euo pipefail

        DOCKER_TAG="$(buildkite-agent meta-data get DOCKER_TAG)"

        cat <<YAML | buildkite-agent pipeline upload
        steps:
          - trigger: unified-release-copy-elastic-images-to-dockerhub
            label: ":docker: Copy release images to Docker Hub"
            key: copy-prod
            async: false
            build:
              env:
                IMAGES_NAMES: "package-registry/distribution"
                IMAGES_TAG: "${DOCKER_TAG}"
          - trigger: unified-release-copy-elastic-images-to-dockerhub
            label: ":docker: Copy release UBI images to Docker Hub"
            key: copy-prod-ubi
            async: false
            build:
              env:
                IMAGES_NAMES: "package-registry/distribution"
                IMAGES_TAG: "${DOCKER_TAG}-ubi"
          - trigger: unified-release-copy-elastic-images-to-dockerhub
            label: ":docker: Copy release lite images to Docker Hub"
            key: copy-lite
            async: false
            build:
              env:
                IMAGES_NAMES: "package-registry/distribution"
                IMAGES_TAG: "lite-${DOCKER_TAG}"
          - trigger: unified-release-copy-elastic-images-to-dockerhub
            label: ":docker: Copy release lite UBI images to Docker Hub"
            key: copy-lite-ubi
            async: false
            build:
              env:
                IMAGES_NAMES: "package-registry/distribution"
                IMAGES_TAG: "lite-${DOCKER_TAG}-ubi"
        YAML
    agents:
      provider: "gcp"
    depends_on:
      - step: "release-distribution"
        allow_failure: false
    retry:
      automatic:
        - exit_status: -1
          limit: 2
        - exit_status: 143
          limit: 2
        - exit_status: 255
          limit: 2

notify:
  - email: "$NOTIFY_TO"
    if: "build.state == 'failed' && build.env('BUILDKITE_PULL_REQUEST') == 'false'"
