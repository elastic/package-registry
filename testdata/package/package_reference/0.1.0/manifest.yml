format_version: 3.6.0
name: package_reference
title: Package Reference
description: >-
  Test package with a policy template input using a package reference instead of type.
type: integration
version: 0.1.0
categories:
  - custom
conditions:
  kibana:
    version: "^8.18.0"
requires:
  input:
    - package: sql_input
      version: 0.2.0
policy_templates:
  - name: package_ref_policy
    title: Package Reference Policy
    description: A policy template with an input referencing a package.
    inputs:
      - package: sql_input
        title: Collect SQL metrics from package reference
        description: Collecting SQL metrics using referenced input package
owner:
  github: elastic/integrations
  type: elastic
